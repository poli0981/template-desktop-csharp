name: CodeQL (C#/.NET)

# Static analysis for C# / .NET 10. Calls the reusable workflow in
# poli0981/.github so every repo stays in sync. If the org-wide workflow
# changes, this caller picks the new defaults up automatically.

on:
  push:
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - "**/Directory.Packages.props"
      - "**/Directory.Build.props"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.sln"
      - "**/Directory.Packages.props"
      - "**/Directory.Build.props"
  schedule:
    # Mondays 04:00 UTC == 11:00 ICT
    - cron: "0 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # CodeQL needs a build to inspect — the reusable workflow hard-errors when no
  # .sln is present. Skip the job entirely until a project lands in src/.
  guard:
    runs-on: ubuntu-latest
    outputs:
      has_csharp: ${{ steps.check.outputs.has_csharp }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        shell: bash
        run: |
          if compgen -G "**/*.sln" > /dev/null || compgen -G "**/*.csproj" > /dev/null; then
            echo "has_csharp=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_csharp=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No .sln/.csproj found — skipping CodeQL until C# code lands."
          fi

  analyze:
    needs: guard
    if: needs.guard.outputs.has_csharp == 'true'
    uses: poli0981/.github/.github/workflows/codeql-csharp.yml@main
    with:
      dotnet_version: "10.0.x"
      queries: "security-extended,security-and-quality"
      timeout_minutes: 30
    secrets: inherit

name: Release Drafter

# Maintains an always-up-to-date draft release on every merge to main. When
# you're ready to ship, edit the draft, publish, and `release.yml` takes over
# from there.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Note: triggering on `pull_request` would require the release-drafter config
# to already exist on the default branch, which fails on the first bootstrap
# merge. The push-only trigger keeps drafts updated after every merge to main
# without needing PR-level autolabeling.

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-drafter
  cancel-in-progress: true

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Stale issues & PRs

# Daily sweep. Issues / PRs with no activity for N days get a friendly nag;
# unresponded after another M days they auto-close. Anything labelled
# `pinned`, `security`, or `keep-open` is exempt.

on:
  schedule:
    # 02:00 UTC == 09:00 ICT, before the work day starts
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,keep-open,help-wanted"
          exempt-pr-labels: "pinned,security,keep-open,blocked"
          stale-issue-message: |
            This issue has been inactive for a while. If it's still relevant,
            please add a comment or update — otherwise it'll close in 14 days.
          stale-pr-message: |
            This PR has been inactive for a while. Push, comment, or rebase to
            keep it open — otherwise it'll close in 14 days.
          close-issue-message: |
            Closing due to inactivity. Reopen if this is still affecting you.
          close-pr-message: |
            Closing due to inactivity. Reopen when you're ready to continue.
          operations-per-run: 60
